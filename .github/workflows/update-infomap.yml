name: Update @mapequation/infomap

on:
  repository_dispatch:
    types: [infomap_release_published]
  workflow_dispatch:
    inputs:
      version:
        description: Exact @mapequation/infomap version to install.
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-infomap-${{ github.event.client_payload.version || inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Resolve target version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail

          version="$INPUT_VERSION"
          if [ -z "$version" ]; then
            version="$PAYLOAD_VERSION"
          fi

          if [ -z "$version" ]; then
            echo "No package version provided." >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Check installed version
        id: current
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail

          current_version="$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; console.log(pkg.dependencies['@mapequation/infomap']);")"
          if [ "$current_version" = "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "@mapequation/infomap is already pinned to $VERSION"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.current.outputs.skip != 'true'
        run: npm ci

      - name: Pin @mapequation/infomap
        if: steps.current.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: npm install --save-exact @mapequation/infomap@$VERSION

      - name: Install Playwright browser
        if: steps.current.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium

      - name: Verify bumped dependency
        if: steps.current.outputs.skip != 'true'
        run: npm run verify

      - name: Commit dependency bump
        if: steps.current.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail

          branch="chore/bump-infomap-$VERSION"
          git checkout -B "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "build: bump @mapequation/infomap to $VERSION"
          git push --force-with-lease origin "$branch"

      - name: Open pull request
        if: steps.current.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
          RELEASE_URL: ${{ github.event.client_payload.release_url }}
        run: |
          set -euo pipefail

          branch="chore/bump-infomap-$VERSION"
          title="build: bump @mapequation/infomap to $VERSION"
          body="Automated package bump for @mapequation/infomap $VERSION."
          if [ -n "${RELEASE_URL:-}" ]; then
            body="$body"$'\n\n'"Release: $RELEASE_URL"
          fi

          existing_pr="$(gh pr list --base master --head "$branch" --state open --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            echo "Pull request #$existing_pr already exists for $branch"
            exit 0
          fi

          gh pr create \
            --base master \
            --head "$branch" \
            --title "$title" \
            --body "$body"
